on: [push]
jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false  # Not for (local) pull_requests
    permissions:
      contents: read
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        fetch-tags: true
    - run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    - run: git fetch --force --prune origin '+refs/heads/*:refs/source/heads/*' '+refs/tags/*:refs/tags/*'
    - run: git push --force --prune https://${{ secrets.GITLAB_INF_TOKEN }}@gitlab.inf.ethz.ch/public-isg/yac-vays/docs.git '+refs/source/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
